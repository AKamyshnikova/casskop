apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  # Kuttl may use the testcase dir or the kuttl suite dir as cwd; script must be committed under test/kuttl/scripts/.
  - command: >-
      bash -c 'if test -f ../scripts/dump-backrest-sidecar.sh; then bash ../scripts/dump-backrest-sidecar.sh;
      elif test -f scripts/dump-backrest-sidecar.sh; then bash scripts/dump-backrest-sidecar.sh;
      else echo "[e2e] WARN: dump-backrest-sidecar.sh not found (pwd=$(pwd))" >&2; fi'
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra-e2e-dc1-rack1
status:
  currentReplicas: 1
  replicas: 1
---
apiVersion: db.orange.com/v2
kind: CassandraCluster
metadata:
  name: cassandra-e2e
status:
  cassandraRackStatus:
    dc1-rack1:
      cassandraLastAction:
        name: Initializing
        status: Done
      phase: Running
  lastClusterAction: Initializing
  lastClusterActionStatus: Done
  phase: Running
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-cassandra-e2e-dc1-rack1-0
spec:
  resources:
    requests:
      storage: 1Gi
  storageClassName: openebs-lvm-sc
  volumeMode: Filesystem
status:
  capacity:
    storage: 1Gi
  phase: Bound
